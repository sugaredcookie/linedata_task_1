name: Configuration Pipeline

on:
  issues:
    types:
      - opened

permissions:
  issues: write

jobs:

  dev:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: DEV Validation
      run: |
        echo "===== ISSUE BODY START ====="
        echo "${{ github.event.issue.body }}"
        echo "===== ISSUE BODY END ====="

        echo ""
        echo "Checking JSON file..."
        cat config/configurations.json

        echo ""
        echo "DEV Debug Complete"


  qa:
    needs: dev
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: QA Validation
        run: |
          echo "Running QA Validation"

          KEY=$(echo "${{ github.event.issue.body }}" | grep "Configuration Key" -A1 | tail -n1 | xargs)

          echo "Key: $KEY"

          if grep -q "\"$KEY\"" config/configurations.json; then
            echo "✓ Configuration Key Found"
          else
            echo "✗ Configuration Key Missing"
            exit 1
          fi

  uat:
    needs: qa
    runs-on: ubuntu-latest

    steps:
      - name: UAT Validation
        run: |
          echo "Running UAT Validation"

          BODY="${{ github.event.issue.body }}"

          if echo "$BODY" | grep -q "Change Reason"; then
            echo "✓ Change Reason Provided"
          else
            echo "✗ Change Reason Missing"
            exit 1
          fi

  prod:
    needs: uat
    runs-on: ubuntu-latest

    steps:
      - name: PROD Validation
        run: |
          echo "Running PROD Validation"

          echo "✓ DEV Passed"
          echo "✓ QA Passed"
          echo "✓ UAT Passed"

          echo ""
          echo "DEPLOYMENT PIPELINE"
          echo "DEV -> QA -> UAT -> PROD"

          echo ""
          echo "✓ Ready For Deployment"