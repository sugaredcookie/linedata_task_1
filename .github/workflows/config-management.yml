name: Config Management

on:
  issues:
    types:
      - opened

permissions:
  issues: write

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - name: Request Details
        run: |
          echo "================================"
          echo "CONFIGURATION CHANGE REQUEST"
          echo "================================"
          echo "${{ github.event.issue.body }}"
          echo ""

      - name: Validate Application
        run: |
          BODY="${{ github.event.issue.body }}"

          if echo "$BODY" | grep -q "LMS"; then
            echo "✓ Application Validation Passed"
          else
            echo "✗ Application Not Found"
            exit 1
          fi

      - name: Validate Configuration Key
        run: |
          BODY="${{ github.event.issue.body }}"

          if echo "$BODY" | grep -q "DB_HOST"; then
            echo "✓ Configuration Key Validation Passed"
          else
            echo "✗ Configuration Key Not Found"
            exit 1
          fi

      - name: Validate Change Reason
        run: |
          echo "✓ Change Reason Provided"

      - name: Display Deployment Pipeline
        run: |
          echo ""
          echo "================================"
          echo "DEPLOYMENT PIPELINE"
          echo "================================"
          echo "DEV"
          echo " ↓ "
          echo "QA"
          echo " ↓ "
          echo "UAT"
          echo " ↓ "
          echo "PROD"

      - name: Request Accepted
        run: |
          echo ""
          echo "================================"
          echo "REQUEST ACCEPTED"
          echo "================================"
          echo "✓ Application Validation Passed"
          echo "✓ Configuration Key Validation Passed"
          echo "✓ Change Request Validated"
          echo ""
          echo "Ready for Workflow Processing"