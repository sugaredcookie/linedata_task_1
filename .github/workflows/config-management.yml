name: Configuration Pipeline

on:
issues:
types:
- opened

permissions:
issues: write

jobs:

dev:
runs-on: ubuntu-latest

```
steps:
  - uses: actions/checkout@v4

  - name: DEV Validation
    run: |
      echo "Running DEV Validation"

      echo ""
      echo "===== ISSUE BODY START ====="
      echo "${{ github.event.issue.body }}"
      echo "===== ISSUE BODY END ====="
      echo ""

      APP=$(echo "${{ github.event.issue.body }}" | grep "Application Name" -A1 | tail -n1 | xargs)

      echo "Extracted Application: [$APP]"

      if grep -q "\"name\": \"$APP\"" config/configurations.json; then
        echo "✓ Application Found"
      else
        echo "✗ Application Not Found"
        exit 1
      fi
```

qa:
needs: dev
runs-on: ubuntu-latest

```
steps:
  - uses: actions/checkout@v4

  - name: QA Validation
    run: |
      echo "Running QA Validation"

      KEY=$(echo "${{ github.event.issue.body }}" | grep "Configuration Key" -A1 | tail -n1 | xargs)

      echo "Extracted Key: [$KEY]"

      if grep -q "\"$KEY\"" config/configurations.json; then
        echo "✓ Configuration Key Found"
      else
        echo "✗ Configuration Key Missing"
        exit 1
      fi
```

uat:
needs: qa
runs-on: ubuntu-latest

```
steps:
  - name: UAT Validation
    run: |
      echo "Running UAT Validation"

      BODY="${{ github.event.issue.body }}"

      if [ -n "$BODY" ]; then
        echo "✓ Issue Body Present"
      else
        echo "✗ Issue Body Empty"
        exit 1
      fi
```

prod:
needs: uat
runs-on: ubuntu-latest

```
steps:
  - name: PROD Validation
    run: |
      echo "Running PROD Validation"

      echo "✓ DEV Passed"
      echo "✓ QA Passed"
      echo "✓ UAT Passed"

      echo ""
      echo "DEPLOYMENT PIPELINE"
      echo "DEV -> QA -> UAT -> PROD"

      echo ""
      echo "✓ Ready For Deployment"
```
