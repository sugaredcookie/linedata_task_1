name: Configuration Pipeline

on:
issues:
types: [opened]

permissions:
contents: write
issues: write
pull-requests: write

jobs:

dev:
name: DEV - Validation
runs-on: ubuntu-latest


steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: 22
      cache: npm

  - name: Install Dependencies
    run: npm install

  - name: DEV Validation
    env:
      ISSUE_BODY: ${{ github.event.issue.body }}
      ISSUE_TITLE: ${{ github.event.issue.title }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}
    run: |
      node scripts/dev-validation.js


qa:
name: QA - Validation
needs: dev
runs-on: ubuntu-latest
environment: qa


steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: 22
      cache: npm

  - name: Install Dependencies
    run: npm install

  - name: QA Validation
    env:
      ISSUE_BODY: ${{ github.event.issue.body }}
    run: |
      node scripts/qa-validation.js


uat:
name: UAT - Validation
needs: qa
runs-on: ubuntu-latest
environment: uat


steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: 22
      cache: npm

  - name: Install Dependencies
    run: npm install

  - name: UAT Validation
    env:
      ISSUE_BODY: ${{ github.event.issue.body }}
    run: |
      node scripts/uat-validation.js


prod:
name: PROD - Deployment
needs: uat
runs-on: ubuntu-latest
environment: production


steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: 22
      cache: npm

  - name: Install Dependencies
    run: npm install

  - name: PROD Validation
    run: |
      echo "DEV Passed"
      echo "QA Passed"
      echo "UAT Passed"
      echo "Ready For Production Deployment"

  - name: Run Configuration Processing Engine
    env:
      ISSUE_BODY: ${{ github.event.issue.body }}
    run: |
      node engine/process-request.js

  - name: Commit And Push Changes
    run: |
      git config user.name "github-actions[bot]"
      git config user.email "github-actions[bot]@users.noreply.github.com"

      git add .

      git commit -m "chore(config): deploy to PROD via Issue" || echo "No changes to commit"

      git push