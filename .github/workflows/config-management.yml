name: Configuration Pipeline

on:
  issues:
    types:
      - opened

permissions:
  issues: write
  contents: write

jobs:

  dev:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - name: DEV Validation
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          node scripts/dev-validation.js

  qa:
    needs: dev
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - name: QA Validation
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          node scripts/qa-validation.js

  uat:
    needs: qa
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - name: UAT Validation
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          node scripts/uat-validation.js

  prod:
    needs: uat
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: PROD Validation
        run: |
          echo "Running PROD Validation"

          echo "✓ DEV Passed"
          echo "✓ QA Passed"
          echo "✓ UAT Passed"

          echo ""
          echo "DEPLOYMENT PIPELINE"
          echo "DEV -> QA -> UAT -> PROD"

          echo ""
          echo "✓ Ready For Deployment"

      - name: Run Configuration Processing Engine
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          node engine/process-request.js

      - name: Commit Changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add .

          git commit -m "Update configuration" || echo "No changes"

          git push