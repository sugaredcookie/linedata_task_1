name: Configuration Request

on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:

  dev:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - name: DEV Validation
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          node scripts/dev-validation.js

  qa:
    needs: dev
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - name: QA Validation
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          node scripts/qa-validation.js

  uat:
    needs: qa
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - name: UAT Validation
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          node scripts/uat-validation.js

  create-pr:
    needs: uat
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Branch
        run: |
          git checkout -b config-change-${{ github.event.issue.number }}

      - name: Create Request File
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          node scripts/create-request-file.js

        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |

          mkdir -p requests

          APPLICATION=$(echo "$ISSUE_BODY" | grep -A1 "Application Name" | tail -n1 | xargs)
          SECTION=$(echo "$ISSUE_BODY" | grep -A1 "Section Name" | tail -n1 | xargs)
          KEY=$(echo "$ISSUE_BODY" | grep -A1 "Configuration Key" | tail -n1 | xargs)
          VALUE=$(echo "$ISSUE_BODY" | grep -A1 "New Value" | tail -n1 | xargs)

          cat > requests/request-${{ github.event.issue.number }}.json <<EOF
          {
            "application": "$APPLICATION",
            "section": "$SECTION",
            "key": "$KEY",
            "newValue": "$VALUE"
          }
          EOF

      - name: Commit Request
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add requests/

          git commit -m "Configuration Request #${{ github.event.issue.number }}"

      - name: Push Branch
        run: |
          git push origin config-change-${{ github.event.issue.number }}

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head config-change-${{ github.event.issue.number }} \
            --title "Configuration Change #${{ github.event.issue.number }}" \
            --body "Awaiting Approval"