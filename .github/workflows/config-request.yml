name: Configuration Request

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  dev:
    name: DEV - Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: DEV Validation
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: node scripts/dev-validation.js

  qa:
    name: QA - Validation
    needs: dev
    runs-on: ubuntu-latest
    environment: qa
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install Dependencies
        run: npm install
      - name: QA Validation
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: node scripts/qa-validation.js

  uat:
    name: UAT - Validation
    needs: qa
    runs-on: ubuntu-latest
    environment: uat
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install Dependencies
        run: npm install
      - name: UAT Validation
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: node scripts/uat-validation.js

  create-pr:
    name: Create Pull Request
    needs: uat
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Create Branch
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          git checkout -b feature/promotion-${ISSUE_NUMBER}

      - name: Create Request File
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          node scripts/create-request-file.js

      - name: Verify Request File
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          echo "Generated Request File:"
          cat requests/request-${ISSUE_NUMBER}.json

      - name: Commit Changes
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add requests/

          git commit -m "Promotion Request ${ISSUE_NUMBER}" || echo "No changes"

      - name: Push Branch
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          git push --force --set-upstream origin feature/promotion-${ISSUE_NUMBER}

      - name: Create Pull Request
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |

          PR_URL=$(gh pr create \
            --base main \
            --head feature/promotion-${ISSUE_NUMBER}--head feature/config-change-${ISSUE_NUMBER} \
            --title "Promotion Request ${ISSUE_NUMBER} - ${ISSUE_TITLE}" \
            --body "ISSUE_NUMBER=${ISSUE_NUMBER}

          Automated promotion request from Issue ${ISSUE_NUMBER}" \
                    --label "promotion"

                  echo "PR_URL=$PR_URL" >> $GITHUB_ENV

                  gh issue comment ${ISSUE_NUMBER} \
                    --body "✅ Pull Request Created

          PR: $PR_URL

          Please review and merge for production deployment."