name: Production Deployment

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    name: PROD - Deployment
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Deploy Approved Request
        env:
          ISSUE_NUMBER: ${{ github.event.pull_request.number }}
        run: node engine/process-request-from-file.js

      - name: Commit Updated Database & Configs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Production Deployment - Issue #${{ github.event.pull_request.number }}" || echo "No changes to commit"
          git push origin HEAD:main