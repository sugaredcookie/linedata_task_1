name: Production Deployment

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:

  deploy:

    if: github.event.pull_request.merged == true

    name: PROD - Deployment

    runs-on: ubuntu-latest

    environment: production

    steps:

      - name: Checkout Workflow Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm install

      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: sugaredcookie
          repositories: linedata-config-store

      - name: Checkout Config Repository
        uses: actions/checkout@v4
        with:
          repository: sugaredcookie/linedata-config-store
          token: ${{ steps.app-token.outputs.token }}
          path: config-repo

      - name: Debug PR Information
        run: |
          echo "PR Number: ${{ github.event.pull_request.number }}"
          echo "PR Title: ${{ github.event.pull_request.title }}"
          echo "----- PR BODY -----"
          echo "${{ github.event.pull_request.body }}"
          echo "-------------------"

      - name: Extract Issue Number
        run: |

          ISSUE_NUMBER=$(echo "${{ github.event.pull_request.body }}" | grep "ISSUE_NUMBER=" | cut -d= -f2)

          echo "Extracted Issue Number: $ISSUE_NUMBER"

          if [ -z "$ISSUE_NUMBER" ]; then
            echo "Failed to extract ISSUE_NUMBER from PR body"
            exit 1
          fi

          echo "ISSUE_NUMBER=$ISSUE_NUMBER" >> $GITHUB_ENV

      - name: Verify Request File Exists
        run: |

          REQUEST_FILE="requests/request-${ISSUE_NUMBER}.json"

          echo "Looking for: $REQUEST_FILE"

          if [ ! -f "$REQUEST_FILE" ]; then
            echo "Request file not found"
            exit 1
          fi

          cat "$REQUEST_FILE"

      - name: Deploy Approved Request
        env:
          ISSUE_NUMBER: ${{ env.ISSUE_NUMBER }}
        run: |
          node engine/process-request-from-file.js

      - name: Verify Config Changes
        run: |
          echo "===== CONFIG REPO ====="
          ls -R config-repo

      - name: Commit Config Changes
        run: |

          cd config-repo

          git config user.name "Config Bot"
          git config user.email "bot@demo.com"

          git add .

          git commit -m "Production Deployment Issue ${ISSUE_NUMBER}" || echo "No changes"

      - name: Push Config Changes
        env:
          TOKEN: ${{ steps.app-token.outputs.token }}
        run: |

          cd config-repo

          git remote set-url origin https://x-access-token:${TOKEN}@github.com/sugaredcookie/linedata-config-store.git

          git push origin HEAD:main