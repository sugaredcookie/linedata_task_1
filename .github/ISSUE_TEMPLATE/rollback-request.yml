name: Rollback Request
description: Request an environment or version rollback
title: "[ROLLBACK]"
labels:
  - rollback

body:

  - type: input
    id: client
    attributes:
      label: Client
      placeholder: JP_MORGAN
    validations:
      required: true

  - type: input
    id: application
    attributes:
      label: Application Name
      placeholder: TRADING
    validations:
      required: true

  - type: input
    id: currentEnvironment
    attributes:
      label: Current Environment
      placeholder: UAT
    validations:
      required: true

  - type: input
    id: rollbackEnvironment
    attributes:
      label: Rollback Environment
      placeholder: QA
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: 1.8.4
    validations:
      required: true

  - type: input
    id: rollbackVersion
    attributes:
      label: Rollback Version
      placeholder: 1.8.3
    validations:
      required: true

  - type: dropdown
    id: requestType
    attributes:
      label: Request Type
      options:
        - ROLLBACK
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Change Reason
      placeholder: Production issue detected
    validations:
      required: true