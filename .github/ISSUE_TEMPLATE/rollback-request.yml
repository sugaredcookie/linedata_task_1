name: Rollback Request

description: Rollback deployment to an older release

title: "[ROLLBACK]"

labels:
  - rollback

body:

  - type: input
    id: client
    attributes:
      label: Client
      placeholder: JP_MORGAN
    validations:
      required: true

  - type: input
    id: project
    attributes:
      label: Project
      placeholder: RECON_WEB
    validations:
      required: true

  - type: input
    id: targetEnvironment
    attributes:
      label: Target Environment
      placeholder: PROD
    validations:
      required: true

  - type: input
    id: releaseId
    attributes:
      label: Release ID
      placeholder: RLS-999
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: 2.26.0424.485
    validations:
      required: true

  - type: dropdown
    id: requestType
    attributes:
      label: Request Type
      options:
        - ROLLBACK
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Change Reason
      placeholder: Production issue detected
    validations:
      required: true