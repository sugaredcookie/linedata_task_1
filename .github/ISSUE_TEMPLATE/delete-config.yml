name: Delete Configuration
description: Request removal of an existing configuration
title: "[DELETE CONFIG] "

body:
  - type: input
    id: application
    attributes:
      label: Application Name
      description: Enter the target application
      placeholder: LMS
    validations:
      required: true

  - type: input
    id: key
    attributes:
      label: Configuration Key
      description: Enter the configuration key to remove
      placeholder: OLD_LEGACY_URL
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Deletion Reason
      description: Explain why the configuration should be removed
      placeholder: Feature fully deprecated
    validations:
      required: true

  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      options:
        - label: I have reviewed the request before submission.
          required: true