name: Promotion Request

description: Promote a release to another environment

title: "[PROMOTION]"

body:

  - type: input
    id: client
    attributes:
      label: Client
      placeholder: JP_MORGAN
    validations:
      required: true

  - type: input
    id: project
    attributes:
      label: Project
      placeholder: RECON_WEB
    validations:
      required: true

  - type: input
    id: sourceEnvironment
    attributes:
      label: Source Environment
      placeholder: QA
    validations:
      required: true

  - type: input
    id: targetEnvironment
    attributes:
      label: Target Environment
      placeholder: UAT
    validations:
      required: true

  - type: input
    id: releaseId
    attributes:
      label: Release ID
      placeholder: RLS-1001
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: 2.26.0602.539
    validations:
      required: true

  - type: dropdown
    id: requestType
    attributes:
      label: Request Type
      options:
        - PROMOTION
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Change Reason
    validations:
      required: true